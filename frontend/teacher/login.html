<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Smart Attendance</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../shared/styles.css" />
  <script src="../shared/theme.js"></script>
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" id="loginForm" autocomplete="on">
      <div class="brand"><span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/></svg></span></div>
      <h1>Smart Attendance</h1>
      <p class="sub">Teacher portal — sign in to start a class</p>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="teacher" required autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-block"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign in</button>
      <div class="toast" id="loginToast"></div>
      <p class="auth-hint">Demo: any username & password works.</p>
    </form>
  </div>

  <script src="../shared/auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
