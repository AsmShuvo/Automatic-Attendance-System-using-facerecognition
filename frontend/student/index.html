<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student · Smart Attendance</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../shared/styles.css" />
  <script src="../shared/theme.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/></svg>
      </span>
      <div>
        <h1>Smart Attendance</h1>
        <span class="role">Student View</span>
      </div>
    </div>
    <nav>
      <a href="../teacher/login.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Teacher portal</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-head">
      <h2>My attendance</h2>
      <p>Enter your registration number to see your record for the latest session.</p>
    </div>

    <section class="card">
      <div class="row">
        <div class="field">
          <label for="regInput">Registration number</label>
          <input type="text" id="regInput" placeholder="e.g. 2021331106" />
        </div>
        <button id="lookupBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Look up</button>
        <button class="ghost" id="refreshBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Refresh</button>
      </div>
      <div class="toast" id="toast"></div>
    </section>

    <section class="card" id="historyCard" style="display:none;">
      <p class="eyebrow">My attendance history</p>
      <h2 id="historyTitle">Records</h2>
      <p class="hint" id="historySub">Every session you were detected in, oldest to newest.</p>
      <div id="historyArea" style="display:none;">
        <table id="historyTable">
          <thead>
            <tr><th>Reg No</th><th>Date</th><th>Course</th><th>Room</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="historyEmpty">No records found.</div>
    </section>
  </main>

  <script src="../shared/api.js"></script>
  <script src="../shared/report.js"></script>
  <script src="student.js"></script>
</body>
</html>
